<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Agent | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/mode-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-one_dark.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #11141b;
            --card: #161b22;
            --border: #30363d;
            --fg: #e6edf3;
            --muted: #848d97;
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --green: #3fb950;
            --red: #f85149;
            --header-h: 64px;
            --glass: rgba(22, 27, 34, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* SCROLLBARS */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        /* HEADER */
        header {
            height: var(--header-h);
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.02em;
        }

        .logo svg {
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--card);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(124, 77, 255, 0.1);
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: #6a3de8;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* LAYOUT */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR */
        aside {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px 0;
        }

        .aside-label {
            padding: 0 24px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        #agentList {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .agent-card {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
        }

        .agent-card:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .agent-card.active {
            background: rgba(124, 77, 255, 0.1);
            border-color: rgba(124, 77, 255, 0.3);
        }

        .agent-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .agent-id {
            font-size: 14px;
            font-weight: 600;
            color: var(--fg);
        }

        .agent-status-text {
            font-size: 12px;
            color: var(--muted);
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            position: relative;
        }

        .status-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* MAIN AREA */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 24px;
            overflow-y: auto;
            position: relative;
        }

        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .agent-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        /* TABS */
        .tab-group {
            display: flex;
            background: var(--card);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .tab-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
        }

        .tab-btn:hover {
            color: var(--fg);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(124, 77, 255, 0.2);
        }

        /* CONTENT CARDS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* FORMS */
        .form-area {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
        }

        select,
        input,
        textarea {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--fg);
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        select:focus,
        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
            min-height: 120px;
        }

        #jsonEditor {
            height: 200px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            background: #0d1117;
        }

        /* CONSOLE */
        .console-wrap {
            padding: 0 24px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }

        .console-box {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 400px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #7ee787;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* TERMINAL VIEW */
        #tab-content-terminal {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .term-container {
            flex: 1;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .term-status-bar {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-on {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        .dot-off {
            background: var(--red);
        }

        /* MODALS / OVERLAYS */
        .no-selection {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 5;
            gap: 16px;
            color: var(--muted);
        }

        .log-dim {
            color: var(--muted);
        }

        /* JSON TOOLBAR */
        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .json-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(124, 77, 255, 0.1);
        }

        .no-selection svg {
            width: 64px;
            height: 64px;
            opacity: 0.2;
        }

        /* HELPER CLASSES */
        .flex-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* FILE MANAGER */
        .file-tree {
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-y: auto;
            flex: 1;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.selected {
            background: rgba(124, 77, 255, 0.2);
            border-color: var(--accent);
        }

        .file-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .file-item.dir svg {
            color: #dcb67a;
        }

        .file-item.file svg {
            color: #79c0ff;
        }

        .file-details {
            margin-left: auto;
            font-size: 11px;
            color: var(--muted);
        }

        .file-children {
            margin-left: 20px;
            border-left: 1px solid var(--border);
        }

        .file-children.collapsed {
            display: none;
        }

        .toggle-icon {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            color: var(--muted);
        }

        .toggle-icon.expanded {
            transform: rotate(90deg);
        }

        #tab-content-files {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 16px;
        }

        .file-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid var(--border);
            min-height: 48px;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 13px;
            color: var(--muted);
            padding: 10px 20px;
            overflow-x: auto;
            white-space: nowrap;
            flex: 1;
        }

        .breadcrumb-item {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s;
            color: var(--muted);
        }

        .breadcrumb-item:hover {
            background: var(--accent);
            color: white;
        }

        .breadcrumb-item.active {
            color: var(--fg);
            font-weight: 600;
        }

        .file-toolbar {
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            min-height: 400px;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .modal-title {
            font-size: 14px;
            font-family: monospace;
            color: var(--fg);
            word-break: break-all;
        }

        .modal-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #0d0d0d;
        }

        .modal-content pre {
            margin: 0;
            font-size: 13px;
            line-height: 1.6;
            color: #d1d1d1;
            white-space: pre-wrap;
            word-break: break-all;
            width: 100%;
            height: 100%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .modal-footer {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
            </svg>
            Edge Agent Dashboard
        </div>
        <div class="header-actions">
            <button onclick="fetchAgents(); fetchCommands();">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Sync
            </button>
        </div>
    </header>

    <div class="app-container">
        <aside>
            <div class="aside-label">Connected Agents</div>
            <div id="agentList">
                <div class="empty-hint">Discovering agents...</div>
            </div>
        </aside>

        <main>
            <div id="noSelection" class="no-selection">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <p>Select an agent to begin</p>
            </div>

            <div id="agentView" class="hidden" style="display: flex; flex-direction: column; flex: 1; gap: 24px;">
                <div class="view-header">
                    <div class="agent-badge">
                        <div class="status-pulse"></div>
                        <div style="display: flex; flex-direction: column;">
                            <span id="activeAgentID">agent-1</span>
                            <span id="activeAgentSubtext"
                                style="font-size: 10px; color: var(--muted); font-weight: 400;">unknown subsystem</span>
                        </div>
                    </div>

                    <div class="tab-group">
                        <button class="tab-btn active" data-tab="cmds">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2">
                                </path>
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                            </svg>
                            Control
                        </button>
                        <button class="tab-btn" data-tab="terminal">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="4 17 10 11 4 5"></polyline>
                                <line x1="12" y1="19" x2="20" y2="19"></line>
                            </svg>
                            Terminal
                        </button>
                        <button class="tab-btn" data-tab="files">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                </path>
                            </svg>
                            Files
                        </button>
                    </div>
                </div>

                <!-- CONTROL TAB -->
                <div id="tab-content-cmds" class="card">
                    <div class="card-header">
                        <div class="card-title">Command Center</div>
                        <div class="flex-row">
                            <div class="sub-tabs tab-group" style="border-radius: 8px;">
                                <button class="tab-btn active" style="padding: 4px 12px; font-size: 11px;"
                                    onclick="switchSub('presets')">Presets</button>
                                <button class="tab-btn" style="padding: 4px 12px; font-size: 11px;"
                                    onclick="switchSub('custom')">Custom</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-area">
                        <div id="sub-presets" class="field-group">
                            <label>Quick Actions</label>
                            <select id="presetSel"></select>
                        </div>

                        <div id="sub-custom" class="hidden">
                            <div class="field-group" style="margin-bottom: 12px;">
                                <label>Command Type</label>
                                <select id="cmdType">
                                    <option value="api_call">api_call</option>
                                    <option value="http_request">http_request</option>
                                    <option value="local_command">local_command</option>
                                    <option value="quick_command">quick_command</option>
                                    <option value="custom">custom</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <div class="field-header">
                                    <label>Payload (JSON)</label>
                                    <div class="json-tools">
                                        <button class="tool-btn" onclick="insertTemplate()">Insert Template</button>
                                        <button class="tool-btn" onclick="formatJSON()">Beautify</button>
                                    </div>
                                </div>
                                <div id="jsonEditor"></div>
                            </div>
                        </div>

                        <button id="sendBtn" class="primary" style="align-self: flex-start; margin-top: 8px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            Execute Command
                        </button>
                    </div>

                    <div class="console-wrap">
                        <div class="field-header" style="margin-bottom: 8px;">
                            <label>Execution Stream</label>
                            <button class="tool-btn" onclick="clearLog()">Clear</button>
                        </div>
                        <div id="cmdLog" class="console-box"></div>
                    </div>
                </div>

                <!-- TERMINAL TAB -->
                <div id="tab-content-terminal" class="hidden">
                    <div class="term-status-bar">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div id="term-status-dot" class="status-dot dot-off"></div>
                            <span id="term-status-text">Disconnected</span>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="tool-btn" id="term-refresh-btn"
                                onclick="openAgentTerminal(selectedAgent, true)" title="New Session">Refresh</button>
                            <button class="tool-btn" id="term-close-btn" onclick="closeTerminal()"
                                title="Terminate Connection">Close</button>
                        </div>
                    </div>
                    <div class="term-container" id="term-box"></div>
                </div>

                <!-- FILES TAB -->
                <div id="tab-content-files" class="card hidden">
                    <div class="file-header-row">
                        <div id="breadcrumbs" class="breadcrumbs"></div>
                        <div class="file-toolbar">
                            <button class="tool-btn" id="btnDownloadFile" disabled onclick="downloadSelectedFile()"
                                title="Download">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Download
                            </button>
                            <button class="tool-btn primary" onclick="document.getElementById('fileInput').click()"
                                title="Upload">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="16 16 12 12 8 16"></polyline>
                                    <line x1="12" y1="12" x2="12" y2="21"></line>
                                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                                </svg>
                                Upload
                            </button>
                            <input type="file" id="fileInput" class="hidden" onchange="uploadFileAtSelected(this)">
                            <button class="tool-btn" id="btnDeleteFile" disabled onclick="deleteSelectedFile()"
                                title="Delete" style="color: var(--red);">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                                Delete
                            </button>
                            <button class="tool-btn" onclick="fetchFiles()" title="Refresh">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="23 4 23 10 17 10"></polyline>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>
                                Refresh
                            </button>
                        </div>
                    </div>
                    <div id="fileTree" class="file-tree">
                        <div class="empty-hint">Loading files...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script>
        let selectedAgent = null;
        let presets = {};
        let templates = {};
        let agentSessions = {}; // agentID -> { ws, xterm, fit, el }
        let aceEditor = null;
        let agentBasePath = '';

        /** EDITOR INIT **/
        function initAce() {
            aceEditor = ace.edit("jsonEditor");
            aceEditor.setTheme("ace/theme/one_dark");
            aceEditor.session.setMode("ace/mode/json");
            aceEditor.setShowPrintMargin(false);
            aceEditor.setOptions({
                fontSize: "13px",
                fontFamily: "JetBrains Mono",
                enableBasicAutocompletion: true,
                useWorker: false // Disable worker for simple CDN usage
            });
            aceEditor.setValue('{\n  "command": "ls -la"\n}', -1);

            // Adjust editor to container size
            aceEditor.renderer.setScrollMargin(8, 8);
        }

        window.onload = () => {
            initAce();
            fetchAgents();
            fetchCommands();
            fetchTemplates();
            // Don't call fetchFiles here, fetchAgents will auto-select and trigger it if needed
            setInterval(fetchAgents, 5000);
        };

        /** TAB SWITCHING **/
        function showTab(tab) {
            document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('tab-content-cmds').classList.toggle('hidden', tab !== 'cmds');
            document.getElementById('tab-content-terminal').classList.toggle('hidden', tab !== 'terminal');
            document.getElementById('tab-content-files').classList.toggle('hidden', tab !== 'files');

            if (tab === 'files') fetchFiles();
            if (tab === 'terminal' && selectedAgent) {
                if (!agentSessions[selectedAgent]) {
                    openAgentTerminal(selectedAgent);
                } else {
                    setTimeout(() => agentSessions[selectedAgent].fit.fit(), 50);
                }
            }
            updateTermStatus();
        }

        document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => showTab(btn.dataset.tab));
        });

        /** API FETCHERS **/
        async function fetchAgents() {
            try {
                const res = await fetch('/api/agents');
                const agents = (await res.json()) || [];
                const list = document.getElementById('agentList');

                if (agents.length === 0) {
                    list.innerHTML = '<div class="empty-hint">No agents active</div>';
                    if (selectedAgent) selectAgent(null);
                    return;
                }
                list.innerHTML = '';

                // Auto-select first agent if none selected
                if (!selectedAgent && agents.length > 0) {
                    selectAgent(agents[0].id, agents[0].metadata);
                }

                let found = false;
                agents.forEach(a => {
                    const id = a.id;
                    const displayId = id.length > 20 ? id.substring(0, 20) + '...' : id;
                    const meta = a.metadata || {};
                    const hostname = meta.hostname || 'Unknown Host';
                    const os = meta.os || 'unknown';

                    const el = document.createElement('div');
                    el.className = 'agent-card' + (id === selectedAgent ? ' active' : '');
                    el.dataset.id = id;
                    el.innerHTML = `
                        <div class="agent-info">
                            <span class="agent-id" title="${id}">${displayId}</span>
                            <span class="agent-status-text">${hostname} (${os})</span>
                        </div>
                        <div class="status-pulse"></div>
                    `;
                    el.onclick = () => selectAgent(id, meta);
                    list.appendChild(el);
                    if (id === selectedAgent) {
                        found = true;
                        // Update active badge if metadata changed
                        const cpu = meta.stats_cpu_usage !== undefined ? ` | CPU: ${meta.stats_cpu_usage}%` : '';
                        const ram = meta.stats_mem_usage !== undefined ? ` | RAM: ${meta.stats_mem_usage}%` : '';
                        const disk = meta.stats_disk_free !== undefined ? ` | Disk: ${meta.stats_disk_free}GB` : '';
                        const lat = meta.latency_ms !== undefined ? ` | Latency: ${meta.latency_ms}ms` : '';

                        document.getElementById('activeAgentSubtext').textContent =
                            `${hostname} | ${os} | v${meta.version || '1.0'}${cpu}${ram}${disk}${lat}`;
                    }
                });

                if (selectedAgent && !found) {
                    selectAgent(null);
                    log('Selected agent disconnected', 'error');
                }
            } catch (e) { console.error('Fetch agents failed', e); }
        }

        async function fetchCommands() {
            try {
                const res = await fetch('/api/commands');
                presets = (await res.json()) || {};
                const sel = document.getElementById('presetSel');
                sel.innerHTML = '<option value="">-- Choose a predefined task --</option>';
                for (const name in presets) {
                    const o = document.createElement('option');
                    o.value = name;
                    o.text = `${name} (${presets[name].type})`;
                    sel.add(o);
                }
            } catch (e) { }
        }

        async function fetchTemplates() {
            try {
                const res = await fetch('/api/templates');
                templates = (await res.json()) || {};
            } catch (e) { }
        }

        /** CORE UI LOGIC **/
        function selectAgent(id, meta = {}) {
            selectedAgent = id;
            const view = document.getElementById('agentView');
            const placeholder = document.getElementById('noSelection');

            if (id) {
                view.classList.remove('hidden');
                placeholder.classList.add('hidden');
                const displayId = id.length > 20 ? id.substring(0, 20) + '...' : id;
                document.getElementById('activeAgentID').textContent = displayId;
                document.getElementById('activeAgentID').title = id;
                const cpu = meta.stats_cpu_usage !== undefined ? ` | CPU: ${meta.stats_cpu_usage}%` : '';
                const ram = meta.stats_mem_usage !== undefined ? ` | RAM: ${meta.stats_mem_usage}%` : '';
                const disk = meta.stats_disk_free !== undefined ? ` | Disk: ${meta.stats_disk_free}GB` : '';
                const lat = meta.latency_ms !== undefined ? ` | Latency: ${meta.latency_ms}ms` : '';

                document.getElementById('activeAgentSubtext').textContent =
                    `${meta.hostname || 'Unknown'} | ${meta.os || 'unknown'} | v${meta.version || '1.0'}${cpu}${ram}${disk}${lat}`;

                // Show/hide Files tab based on agent capability
                const enabledCmds = meta.stats_enabled_commands || {};
                const fmEnabled = enabledCmds.file_manager !== false; // Default to true if not specified
                const btnFiles = document.querySelector('.tab-btn[data-tab="files"]');
                if (btnFiles) {
                    if (fmEnabled) {
                        btnFiles.classList.remove('hidden');
                    } else {
                        btnFiles.classList.add('hidden');
                        // If files tab was active, switch to terminal or control
                        if (btnFiles.classList.contains('active')) {
                            switchTab('terminal');
                        }
                    }
                }

                // If on Files tab, refresh file tree for this agent
                if (fmEnabled && document.querySelector('.tab-btn[data-tab="files"]').classList.contains('active')) {
                    fetchFiles();
                }
            } else {
                view.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            // Re-render agent list classes
            document.querySelectorAll('.agent-card').forEach(el => {
                const aid = el.dataset.id;
                el.classList.toggle('active', aid === id);
            });

            // Switch terminal visibility
            document.querySelectorAll('.agent-term-container').forEach(c => c.classList.add('hidden'));
            if (agentSessions[id]) {
                agentSessions[id].el.classList.remove('hidden');
                setTimeout(() => agentSessions[id].fit.fit(), 10);
            }

            // Update Status UI
            updateTermStatus();

            // Auto-connect if terminal tab is active
            const isTermActive = document.querySelector('.tab-btn[data-tab="terminal"]').classList.contains('active');
            if (id && isTermActive && !agentSessions[id]) {
                openAgentTerminal(id);
            }
        }


        function switchSub(name) {
            const presetBtn = document.querySelector('button[onclick="switchSub(\'presets\')"]');
            const customBtn = document.querySelector('button[onclick="switchSub(\'custom\')"]');

            presetBtn.classList.toggle('active', name === 'presets');
            customBtn.classList.toggle('active', name === 'custom');

            document.getElementById('sub-presets').classList.toggle('hidden', name !== 'presets');
            document.getElementById('sub-custom').classList.toggle('hidden', name !== 'custom');
        }

        document.getElementById('presetSel').addEventListener('change', e => {
            const p = presets[e.target.value];
            if (p) {
                document.getElementById('cmdType').value = p.type;
                if (aceEditor) aceEditor.setValue(JSON.stringify(p.payload, null, 2), -1);
            }
        });

        /** COMMAND EXECUTION **/
        document.getElementById('sendBtn').onclick = async () => {
            if (!selectedAgent) return;

            const isPreset = !document.getElementById('sub-presets').classList.contains('hidden');
            let type, payloadStr;

            if (isPreset) {
                const n = document.getElementById('presetSel').value;
                if (!n) { alert('Select a command first'); return; }
                type = presets[n].type;
                payloadStr = JSON.stringify(presets[n].payload);
            } else {
                type = document.getElementById('cmdType').value.trim();
                payloadStr = aceEditor ? aceEditor.getValue() : "{}";
            }

            if (!type) { alert('Command type is required'); return; }
            let payload = {};
            try { if (payloadStr) payload = JSON.parse(payloadStr); } catch (e) { alert('JSON Error: ' + e.message); return; }

            log(`→ Sending ${type}...`, 'dim');
            try {
                const r = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: selectedAgent, type, payload })
                });
                const d = await r.json();
                if (r.ok && d.success) {
                    const result = d.payload ? (d.payload.data || d.payload.output || d.payload) : d;
                    log(typeof result === 'object' ? JSON.stringify(result, null, 2) : result, 'ok');
                } else {
                    log(d.error || JSON.stringify(d), 'error');
                }
            } catch (e) { log(e.message, 'error'); }
        };

        function log(msg, cls) {
            const el = document.getElementById('cmdLog');
            const span = document.createElement('div');
            span.style.color = cls === 'error' ? 'var(--red)' : cls === 'ok' ? '#7ee787' : 'var(--muted)';
            span.style.marginBottom = '4px';
            span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(span);
            el.scrollTop = el.scrollHeight;
        }

        /** TERMINAL (XTERM.JS) **/
        /** TERMINAL (XTERM.JS) INTERNALS **/
        function initTerm(agentID) {
            const container = document.getElementById('term-box');
            const termEl = document.createElement('div');
            termEl.className = 'agent-term-container';
            termEl.id = `term-container-${agentID}`;
            termEl.style.width = '100%';
            termEl.style.height = '100%';
            container.appendChild(termEl);

            const tx = new Terminal({
                cols: 100, rows: 30,
                theme: {
                    background: '#010409',
                    foreground: '#e6edf3',
                    cursor: '#7c4dff',
                    selectionBackground: 'rgba(124, 77, 255, 0.3)'
                },
                fontFamily: '"JetBrains Mono", Menlo, monospace',
                fontSize: 13,
                cursorBlink: true,
                scrollback: 10000,
            });

            const fa = new FitAddon.FitAddon();
            tx.loadAddon(fa);
            tx.open(termEl);
            setTimeout(() => fa.fit(), 50);

            tx.onResize(size => {
                const s = agentSessions[agentID];
                if (s && s.ws && s.ws.readyState === WebSocket.OPEN) {
                    s.ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
                }
            });

            tx.onData(d => {
                const s = agentSessions[agentID];
                if (s && s.ws && s.ws.readyState === WebSocket.OPEN) s.ws.send(d);
            });

            agentSessions[agentID] = {
                xterm: tx,
                fit: fa,
                el: termEl,
                ws: null
            };

            return agentSessions[agentID];
        }

        window.addEventListener('resize', () => {
            if (selectedAgent && agentSessions[selectedAgent]) {
                agentSessions[selectedAgent].fit.fit();
            }
        });

        function openAgentTerminal(agentID, force = false) {
            if (!agentID) { alert("Please select an agent first"); return; }

            let s = agentSessions[agentID];

            if (s && s.ws && s.ws.readyState === WebSocket.OPEN && !force) {
                return; // Already connected
            }

            if (force && s && s.ws && s.ws.readyState === WebSocket.OPEN) {
                if (!confirm("Close current session and start a new one?")) return;
                s.ws.close();
            }

            if (!s) s = initTerm(agentID);

            // Re-show container just in case
            document.querySelectorAll('.agent-term-container').forEach(c => c.classList.add('hidden'));
            s.el.classList.remove('hidden');

            s.xterm.reset();
            s.xterm.writeln(`\x1b[35m[System] Connecting to agent: ${agentID} ...\x1b[0m`);

            const cols = s.xterm.cols;
            const rows = s.xterm.rows;

            const url = `ws://${location.host}/agent-terminal?agent=${encodeURIComponent(agentID)}&cols=${cols}&rows=${rows}`;
            s.ws = new WebSocket(url);

            s.ws.onopen = () => {
                updateTermStatus();
                s.xterm.focus();
            };
            s.ws.onclose = () => {
                updateTermStatus();
                s.xterm.writeln('\r\n\x1b[31m[System] Connection closed.\x1b[0m');
            };
            s.ws.onerror = () => {
                updateTermStatus();
                s.xterm.writeln('\r\n\x1b[31m[System] Connection error.\x1b[0m');
            };
            s.ws.onmessage = e => s.xterm.write(e.data);
        }

        function closeTerminal() {
            const s = agentSessions[selectedAgent];
            if (s && s.ws) {
                s.ws.close();
                s.ws = null;
            }
            updateTermStatus();
        }

        function updateTermStatus() {
            const s = agentSessions[selectedAgent];
            const on = s && s.ws && s.ws.readyState === WebSocket.OPEN;
            const dot = document.getElementById('term-status-dot');
            const txt = document.getElementById('term-status-text');
            if (dot && txt) {
                dot.className = 'status-dot ' + (on ? 'dot-on' : 'dot-off');
                txt.textContent = on ? 'Connected (Interactive Shell)' : 'Disconnected';
            }
        }

        function clearLog() {
            document.getElementById('cmdLog').innerHTML = '';
        }

        function formatJSON() {
            if (!aceEditor) return;
            try {
                const val = aceEditor.getValue();
                const obj = JSON.parse(val);
                aceEditor.setValue(JSON.stringify(obj, null, 2), -1);
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function insertTemplate() {
            if (!aceEditor || !templates) return;
            const type = document.getElementById('cmdType').value;

            // Пытаемся найти шаблон в новой секции templates
            const tplData = templates[type];
            // Поддержка как PascalCase (Payload), так и camelCase (payload)
            const tpl = tplData ? (tplData.payload || tplData.Payload || tplData) : { "error": "Template not found in 'templates' config section" };

            aceEditor.setValue(JSON.stringify(tpl, null, 2), -1);
        }

        /** FILE MANAGER LOGIC **/
        let selectedFilePath = null;
        let isFileSelected = false;
        let expandedFolders = new Set(); // Store paths of expanded folders (initially empty = all collapsed)

        async function fetchFiles() {
            const treeEl = document.getElementById('fileTree');
            if (treeEl.innerHTML === '') treeEl.innerHTML = '<div class="empty-hint">Loading file tree...</div>';

            try {
                const res = await fetch('/api/files/list');
                const tree = await res.json();
                treeEl.innerHTML = '';
                if (!tree || tree.length === 0) {
                    treeEl.innerHTML = '<div class="empty-hint">No files found or base path empty</div>';
                    return;
                }
                renderFileTree(tree, treeEl);
            } catch (e) {
                treeEl.innerHTML = `<div class="empty-hint" style="color: var(--red)">Error: ${e.message}</div>`;
            }
        }

        function renderFileTree(nodes, container) {
            nodes.sort((a, b) => (b.is_dir - a.is_dir) || a.name.localeCompare(b.name));
            nodes.forEach(node => {
                const item = document.createElement('div');
                item.className = `file-item ${node.is_dir ? 'dir' : 'file'}`;
                if (selectedFilePath === node.path) item.classList.add('selected');

                const isExpanded = expandedFolders.has(node.path);

                // Toggle icon (arrow)
                const toggleHtml = node.is_dir
                    ? `<div class="toggle-icon ${isExpanded ? 'expanded' : ''}" onclick="toggleFolder('${node.path.replace(/'/g, "\\'")}'); event.stopPropagation();">
                         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                       </div>`
                    : '<div style="width: 14px;"></div>';

                // File/Folder icon
                const icon = node.is_dir
                    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>'
                    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>';

                item.innerHTML = `
                    ${toggleHtml}
                    ${icon}
                    <span class="file-name" data-path="${node.path}">${node.name}</span>
                    <span class="file-details">${node.is_dir ? '' : formatBytes(node.size)}</span>
                `;

                item.onclick = (e) => {
                    e.stopPropagation();
                    selectFile(node);
                    if (node.is_dir) toggleFolder(node.path);
                };

                item.ondblclick = (e) => {
                    e.stopPropagation();
                    if (!node.is_dir) {
                        openPreviewModal(node);
                    }
                };

                container.appendChild(item);

                if (node.is_dir && node.children && node.children.length > 0) {
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = `file-children ${isExpanded ? '' : 'collapsed'}`;
                    renderFileTree(node.children, childrenContainer);
                    container.appendChild(childrenContainer);
                }
            });
        }

        function toggleFolder(path) {
            if (expandedFolders.has(path)) {
                expandedFolders.delete(path);
            } else {
                expandedFolders.add(path);
            }
            // Rapid re-render
            const treeEl = document.getElementById('fileTree');
            const scrollTop = treeEl.scrollTop;
            renderAll(); // Use a local render instead of full fetch for speed
            treeEl.scrollTop = scrollTop;
        }

        let currentTreeData = null;
        async function fetchFiles() {
            if (!selectedAgent) {
                document.getElementById('fileTree').innerHTML = '<div class="empty-hint">Please select an agent first</div>';
                return;
            }
            try {
                const res = await fetch(`/api/files/list?agent_id=${selectedAgent}`);
                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();
                currentTreeData = data.nodes || data;
                agentBasePath = data.base_path || '';

                if (agentBasePath && (!selectedFilePath || selectedFilePath === 'No file selected')) {
                    renderBreadcrumbs('');
                }
                renderAll();
            } catch (e) {
                document.getElementById('fileTree').innerHTML = `<div class="empty-hint" style="color: var(--red)">Error: ${e.message}</div>`;
            }
        }

        function renderAll() {
            const treeEl = document.getElementById('fileTree');
            if (!currentTreeData) return;
            treeEl.innerHTML = '';
            renderFileTree(currentTreeData, treeEl);
        }

        function selectFile(node) {
            selectedFilePath = node.path;
            isFileSelected = !node.is_dir;

            document.getElementById('btnDownloadFile').disabled = !isFileSelected;
            document.getElementById('btnDeleteFile').disabled = !selectedFilePath;

            document.querySelectorAll('.file-item').forEach(el => {
                const nameEl = el.querySelector('.file-name');
                el.classList.toggle('selected', nameEl && nameEl.dataset.path === node.path);
            });

            renderBreadcrumbs(node.path);
        }

        function renderBreadcrumbs(path) {
            const container = document.getElementById('breadcrumbs');
            if (!container) return;
            container.innerHTML = '';

            const rootItem = document.createElement('span');
            rootItem.className = 'breadcrumb-item' + (!path ? ' active' : '');
            rootItem.textContent = agentBasePath || 'Root';
            rootItem.onclick = () => {
                selectedFilePath = '';
                expandedFolders.clear();
                renderAll();
                renderBreadcrumbs('');
            };
            container.appendChild(rootItem);

            if (!path) return;

            const parts = path.split('/').filter(p => p);
            let currentPath = '';

            parts.forEach((part, index) => {
                const sep = document.createElement('span');
                sep.textContent = '/';
                sep.style.opacity = '0.5';
                container.appendChild(sep);

                currentPath = currentPath ? currentPath + '/' + part : part;
                const item = document.createElement('span');
                item.className = 'breadcrumb-item' + (index === parts.length - 1 ? ' active' : '');
                item.textContent = part;

                const thisPath = currentPath;
                item.onclick = () => {
                    const node = findNodeByPath(currentTreeData, thisPath);
                    if (node) {
                        // Collapse everything BUT the path to this node
                        const parents = [];
                        const parts = thisPath.split('/');
                        let curP = '';
                        for (let i = 0; i < parts.length - 1; i++) {
                            curP = curP ? curP + '/' + parts[i] : parts[i];
                            parents.push(curP);
                        }
                        expandedFolders.clear();
                        parents.forEach(p => expandedFolders.add(p));

                        renderAll();
                        selectFile(node);
                    }
                };
                container.appendChild(item);
            });
        }

        function findNodeByPath(nodes, path) {
            if (!nodes) return null;
            for (const node of nodes) {
                if (node.path === path) return node;
                if (node.children) {
                    const found = findNodeByPath(node.children, path);
                    if (found) return found;
                }
            }
            return null;
        }

        function isImageFile(path) {
            const ext = path.split('.').pop().toLowerCase();
            return ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp'].includes(ext);
        }

        async function openPreviewModal(node) {
            const modal = document.getElementById('filePreviewModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');

            title.textContent = node.path;
            content.innerHTML = '<div class="empty-hint">Loading preview...</div>';
            modal.classList.add('active');

            const downloadUrl = `/api/files/download?agent_id=${selectedAgent}&path=${encodeURIComponent(node.path)}`;

            try {
                const res = await fetch(downloadUrl);
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText || `Server returned ${res.status}`);
                }

                const blob = await res.blob();
                const type = blob.type;

                if (isImageFile(node.path) || type.startsWith('image/')) {
                    const url = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = () => {
                        content.innerHTML = '';
                        content.style.display = 'flex';
                        content.style.alignItems = 'center';
                        content.style.justifyContent = 'center';
                        content.style.padding = '24px';
                        content.appendChild(img);
                        img._blobUrl = url;
                    };
                    img.onerror = () => {
                        content.innerHTML = `<div class="empty-hint" style="color: var(--red)">Failed to render image (Type: ${type}, Size: ${blob.size})</div>`;
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                } else {
                    content.style.display = 'flex';
                    content.style.flexDirection = 'column';
                    content.style.alignItems = 'stretch';
                    content.style.justifyContent = 'stretch';
                    content.style.padding = '0';
                    let text = await blob.text();
                    let mode = 'ace/mode/text';

                    // Try to pretty print if it's JSON
                    try {
                        const jsonObj = JSON.parse(text);
                        text = JSON.stringify(jsonObj, null, 2);
                        mode = 'ace/mode/json';
                    } catch (e) {
                        // Not JSON, check extension
                        const ext = node.path.split('.').pop().toLowerCase();
                        if (ext === 'md') mode = 'ace/mode/markdown';
                        else if (ext === 'go') mode = 'ace/mode/golang';
                        else if (ext === 'yml' || ext === 'yaml') mode = 'ace/mode/yaml';
                    }

                    content.innerHTML = '<div id="acePreview" style="flex: 1; width: 100%;"></div>';

                    if (window.ace) {
                        setTimeout(() => {
                            try {
                                const editor = ace.edit("acePreview");
                                editor.setTheme("ace/theme/one_dark");
                                editor.session.setMode(mode);
                                editor.setReadOnly(true);
                                editor.setValue(text, -1);
                                editor.setOptions({
                                    fontSize: "12px",
                                    fontFamily: "JetBrains Mono",
                                    showPrintMargin: false,
                                    scrollPastEnd: 0.1
                                });
                                editor.resize();
                            } catch (aceErr) {
                                console.error("Ace init error:", aceErr);
                                content.innerHTML = `<pre style="padding: 24px; color: #ccc; white-space: pre-wrap; font-size: 13px; font-family: 'JetBrains Mono'; margin: 0; flex: 1; overflow: auto;">${text}</pre>`;
                            }
                        }, 50);
                    } else {
                        content.innerHTML = `<pre style="padding: 24px; color: #ccc; white-space: pre-wrap; font-size: 13px; font-family: 'JetBrains Mono'; margin: 0; flex: 1; overflow: auto;">${text}</pre>`;
                    }
                }
            } catch (e) {
                content.innerHTML = `<div class="empty-hint" style="color: var(--red)">Error: ${e.message}</div>`;
            }
        }

        function closePreviewModal() {
            document.getElementById('filePreviewModal').classList.remove('active');
        }

        function downloadFromModal() {
            downloadSelectedFile();
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function downloadSelectedFile() {
            if (!selectedFilePath || !isFileSelected || !selectedAgent) return;
            window.open(`/api/files/download?agent_id=${selectedAgent}&path=${encodeURIComponent(selectedFilePath)}`, '_blank');
        }

        async function uploadFileAtSelected(input) {
            const file = input.files[0];
            if (!file) return;

            let uploadPath = selectedFilePath || "";
            if (isFileSelected) {
                uploadPath = uploadPath.substring(0, uploadPath.lastIndexOf('/'));
            }
            uploadPath = uploadPath ? (uploadPath.endsWith('/') ? `${uploadPath}${file.name}` : `${uploadPath}/${file.name}`) : file.name;

            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const res = await fetch(`/api/files/upload?agent_id=${selectedAgent}&path=${encodeURIComponent(uploadPath)}`, {
                        method: 'POST',
                        body: reader.result
                    });
                    if (res.ok) {
                        log(`Uploaded ${file.name} to ${uploadPath}`, 'ok');
                        fetchFiles();
                    } else {
                        const err = await res.text();
                        log(`Upload failed: ${err}`, 'error');
                    }
                } catch (e) {
                    log(`Upload error: ${e.message}`, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function deleteSelectedFile() {
            if (!selectedFilePath || !selectedAgent) return;
            if (!confirm(`Are you sure you want to delete ${selectedFilePath}?`)) return;

            try {
                const res = await fetch(`/api/files/delete?agent_id=${selectedAgent}&path=${encodeURIComponent(selectedFilePath)}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    log(`Deleted ${selectedFilePath}`, 'ok');
                    selectedFilePath = null;
                    isFileSelected = false;
                    document.getElementById('btnDownloadFile').disabled = true;
                    document.getElementById('btnDeleteFile').disabled = true;
                    fetchFiles();
                } else {
                    const err = await res.text();
                    log(`Delete failed: ${err}`, 'error');
                }
            } catch (e) {
                log(`Delete error: ${e.message}`, 'error');
            }
        }
    </script>
    <div id="filePreviewModal" class="modal-overlay" onclick="if(event.target === this) closePreviewModal()">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">File Preview</div>
                <button class="tool-btn" onclick="closePreviewModal()" style="border: none; background: transparent;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-content" id="modalContent">
                <div class="empty-hint">Loading...</div>
            </div>
            <div class="modal-footer">
                <button class="tool-btn" onclick="downloadFromModal()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download
                </button>
                <button class="tool-btn" onclick="document.getElementById('fileInput').click()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 16 12 12 8 16"></polyline>
                        <line x1="12" y1="12" x2="12" y2="21"></line>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                    </svg>
                    Upload
                </button>
                <button class="tool-btn primary" onclick="closePreviewModal()">Close</button>
            </div>
        </div>
    </div>
</body>

</html>
